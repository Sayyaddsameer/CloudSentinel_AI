<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant — CloudSentinel</title>
  <meta name="description" content="CloudSentinel AI assistant — ask questions about your detected risks and get contextual remediation guidance.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/theme.js"></script>
  <script src="js/env.js"></script>
</head>
<body>

  <nav class="topbar">
    <div class="topbar-brand">
      CloudSentinel <span style="color:var(--text-3);margin:0 .5rem">/</span> AI Assistant
    </div>
    <div class="topbar-actions">
      <a href="dashboard.html" class="btn btn-ghost btn-sm">Back to Dashboard</a>
      <button class="btn btn-ghost btn-sm text-danger" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="container" style="max-width:800px;margin-top:2rem;">
    <div class="card" style="padding:0;overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 120px)">
      <div style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div>
          <div class="card-title">AI DevOps Assistant</div>
          <div class="card-subtitle">Ask about your detected risks, how to prioritize them, or how to fix specific issues.</div>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <label style="font-size:.8rem;font-weight:600;color:var(--text-3)" for="module-select">Context:</label>
          <select class="form-input" id="module-select" style="padding:.25rem .5rem;height:auto;font-size:.875rem">
            <option value="cloud-infra">Cloud Infrastructure</option>
            <option value="devops">DevOps</option>
            <option value="fullstack">Full-Stack</option>
            <option value="data-eng">Data Engineering</option>
            <option value="mobile">Mobile Backend</option>
          </select>
        </div>
      </div>

      <div class="chat-messages" id="chat-messages" role="log" aria-live="polite" style="flex:1;overflow-y:auto;padding:1.5rem;"></div>

      <div style="padding:1rem 1.5rem;border-top:1px solid var(--border);background:var(--bg)">
        <div style="display:flex;gap:.75rem">
          <textarea
            class="form-input"
            id="chat-input"
            placeholder="Ask something — e.g. Which risk should I fix first? Why is this resource flagged?"
            rows="1"
            aria-label="Chat input"
            style="resize:none;min-height:44px;padding-top:.7rem"
          ></textarea>
          <button class="btn btn-primary" id="send-btn" onclick="sendMessage()" style="min-width:80px;height:44px;">Send</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/auth.js"></script>
  <script src="js/session.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
