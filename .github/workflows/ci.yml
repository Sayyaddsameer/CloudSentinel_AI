name: CI

on:
  push:
    branches:
      - "feature/**"
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install boto3 "moto[all]" pytest pytest-cov

      - name: Install module requirements
        run: |
          for req in modules/*/requirements.txt; do
            pip install -r "$req" 2>/dev/null || true
          done

      - name: Run unit tests
        env:
          DYNAMODB_TABLE: cloudsentinel-risks
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: |
          pytest tests/ -v --tb=short --cov=modules --cov-report=term-missing

  security:
    name: Security scan (Bandit)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (fail on HIGH severity)
        run: |
          bandit -r modules/ -f txt -o bandit-report.txt -ll
          cat bandit-report.txt

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt
        continue-on-error: true

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform fmt check
        working-directory: infrastructure/terraform
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform init (no backend)
        working-directory: infrastructure/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infrastructure/terraform
        run: terraform validate
